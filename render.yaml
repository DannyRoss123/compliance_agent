databases:
  - name: guardians-db
    plan: free
    databaseName: guardians
    user: guardians

services:
  - type: web
    name: guardians-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: guardians-data
      mountPath: /var/guardians/data
      sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GITHUB_ACCESS_TOKEN
        sync: false
      - key: GUARDIANS_API_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: guardians-db
          property: connectionString
      - key: GUARDIANS_DATA_DIR
        value: /var/guardians/data
      - key: HF_HOME
        value: /var/guardians/data/hf_cache
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /var/guardians/data/hf_cache
      - key: PYTHON_VERSION
        value: 3.11.9
